<!DOCTYPE html>
<html>

<head>
<title>Notes Manager</title>
</head>

<body>

<h2>Add Note</h2>

<input id="title" placeholder="Title"><br><br>
<input id="subject" placeholder="Subject"><br><br>
<textarea id="description"></textarea><br><br>

<button onclick="addNote()">Add</button>

<h2>Notes</h2>

<div id="notes"></div>

<script>

const API="http://localhost:3000";

function addNote(){

const data={
title:document.getElementById("title").value,
subject:document.getElementById("subject").value,
description:document.getElementById("description").value
};

fetch(API+"/notes",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(()=>loadNotes());

}

function loadNotes(){

fetch(API+"/notes")
.then(res=>res.json())
.then(data=>{

let output="";

data.forEach(note=>{

output+=`
<div>
<b>${note.title}</b><br>
${note.subject}<br>
${note.description}<br>

<button onclick="deleteNote('${note._id}')">Delete</button>
<button onclick="editNote('${note._id}')">Edit</button>

<hr>
</div>
`;

});

document.getElementById("notes").innerHTML=output;

});

}

function deleteNote(id){

fetch(API+"/notes/"+id,{method:"DELETE"})
.then(()=>loadNotes());

}

function editNote(id){

const title=prompt("New Title");
const desc=prompt("New Description");

fetch(API+"/notes/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title:title,description:desc})
})
.then(()=>loadNotes());

}

loadNotes();

</script>

</body>
</html>
